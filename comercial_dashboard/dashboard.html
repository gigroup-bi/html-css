<!DOCTYPE html>
<html lang='pt-BR'>
<head>
<meta charset='UTF-8' />
<meta name='viewport' content='width=device-width, initial-scale=1' />
<title>Gi Group </title>
<link rel="icon" type="image/png" href="https://gigroup-bi.github.io/html-css/saint-gobain/LogoGi.png">
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }
  .sidebar {
    width: 220px;
    background-color: #2f3542;
    color: white;
    display: flex;
    flex-direction: column;
    padding-top: 20px;
  }
  .sidebar h2 {
    text-align: center;
    margin-bottom: 10%;
    font-weight: 600;
  }
  .menu-item {
    padding: 5% 20px;
    cursor: pointer;
    transition: background 0.3s;
    border-left: 5px solid transparent;
    user-select: none;
  }
  .menu-item:hover {
    background-color: #57606f;
  }
  .menu-item.active {
    background-color: #3742fa;
    border-left: 5px solid #70a1ff;
  }
  .content {
    flex-grow: 1;
    background-color: #f1f2f6;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }
  iframe {
    border: 0;
    margin-top: 2%;
    width: 98%;      /* largura fixa conforme seu exemplo */
    height: 95%;   /* altura fixa conforme seu exemplo */
  }

  /* Responsivo para telas menores */
  @media (max-width: 1200px) {
    iframe {
      width: 90vw;
      height: calc(90vw * 0.8); /* mantém proporção 1140:541.25 */
    }
  }
</style>
</head>
<body>

<div class='sidebar'>
  <h2>Gi Group</h2>
  <div class='menu-item active' onclick='loadDashboard(event, "https://app.powerbi.com/reportEmbed?reportId=d83fc7bf-d0c6-4803-9b4b-3be8fdbb66fb&autoAuth=true&ctid=64bf466f-84c1-4aa6-abe5-65ec5fb1a327&actionBarEnabled=true&actionBarEnabled=1486c2168e34434e0367")'>Visita perfeita</div>
  <div class='menu-item' onclick='loadDashboard(event, "https://app.powerbi.com/reportEmbed?reportId=8ad2293a-12b9-4d9d-9f6c-e1ec71f73c6b&autoAuth=true&ctid=64bf466f-84c1-4aa6-abe5-65ec5fb1a327&actionBarEnabled=true&pageName=ReportSection7dca0adc002a01b0a013")'>Cobertura</div>
  <div class='menu-item' onclick='loadDashboard(event, "https://app.powerbi.com/reportEmbed?reportId=04c0f6b7-e474-4cf3-ac00-25d7d2a85e21&autoAuth=true&ctid=64bf466f-84c1-4aa6-abe5-65ec5fb1a327&actionBarEnabled=true&pageName=ReportSection5f88bea6c239d5644bee")'>Disponibilidade & Ruptura</div>
  <div class='menu-item' onclick='loadDashboard(event, "https://app.powerbi.com/reportEmbed?reportId=31656a30-4366-4f05-9450-23dcf73284b7&autoAuth=true&ctid=64bf466f-84c1-4aa6-abe5-65ec5fb1a327&actionBarEnabled=true
&pageName=3ddbd452b3ebd7f5827d")'>Share</div>
  <div class='menu-item' onclick='loadDashboard(event, "https://app.powerbi.com/reportEmbed?reportId=59f9a2f1-9fa8-4539-93a2-a14d1c8d00c4&autoAuth=true&ctid=64bf466f-84c1-4aa6-abe5-65ec5fb1a327&actionBarEnabled=true&pageName=1c0afed0e80845362980")'>Preço</div>
  <div class='menu-item' onclick='loadDashboard(event, "https://app.powerbi.com/reportEmbed?reportId=59f9a2f1-9fa8-4539-93a2-a14d1c8d00c4&autoAuth=true&ctid=64bf466f-84c1-4aa6-abe5-65ec5fb1a327&actionBarEnabled=true&pageName=70d14ba30860e985b837")'>Conquista de Ponto Extra</div>
</div>

<div class='content'>
  <iframe 
    id='dashboard-frame' 
    title='Dashboard'
    src='https://app.powerbi.com/reportEmbed?reportId=d83fc7bf-d0c6-4803-9b4b-3be8fdbb66fb&autoAuth=true&ctid=64bf466f-84c1-4aa6-abe5-65ec5fb1a327&actionBarEnabled=true&actionBarEnabled=1486c2168e34434e0367' 
    allowfullscreen='true' 
    frameborder='0'>
  </iframe>
</div>

<script>
  const menuItems = document.querySelectorAll('.menu-item');
  const iframe = document.getElementById('dashboard-frame');

  function loadDashboard(event, url) {
    iframe.src = url;
    menuItems.forEach(item => item.classList.remove('active'));
    event.currentTarget.classList.add('active');
  }
</script>

</body>
</html>
